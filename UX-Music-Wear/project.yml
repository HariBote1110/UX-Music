name: UX-Music-Wear

options:
  bundleIdPrefix: com.uxlabs
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Set your Team ID here

# ─── Targets ────────────────────────────────────────────────────────────────

targets:

  # ── iPhone App ─────────────────────────────────────────────────────────────
  UX-Music-Wear:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    bundleId: com.uxlabs.ux-music-wear

    sources:
      - path: iPhoneApp
        excludes:
          - "**/*.md"
      - path: Shared
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uxlabs.ux-music-wear
        INFOPLIST_FILE: iPhoneApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad

    dependencies:
      - sdk: WatchConnectivity.framework

    info:
      path: iPhoneApp/Info.plist
      properties:
        CFBundleName: UX Music Wear
        CFBundleDisplayName: UX Music Wear
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "UX Music Wear connects to the UX Music app on your Mac over the local network to sync music."
        NSBonjourServices:
          - _ux-music-wear._tcp

  # ── Watch App ──────────────────────────────────────────────────────────────
  UX-Music-Wear-Watch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    bundleId: com.uxlabs.ux-music-wear.watchkitapp

    sources:
      - path: WatchApp
        excludes:
          - "**/*.md"
      - path: Shared
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uxlabs.ux-music-wear.watchkitapp
        INFOPLIST_FILE: WatchApp/Info.plist
        TARGETED_DEVICE_FAMILY: "4"  # Apple Watch

    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: AVFoundation.framework
      - sdk: WatchKit.framework

    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleName: UX Music Wear
        WKWatchKitApp: true
        WKCompanionAppBundleIdentifier: com.uxlabs.ux-music-wear
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: ""

schemes:
  UX-Music-Wear:
    build:
      targets:
        UX-Music-Wear: all
        UX-Music-Wear-Watch: all
    run:
      config: Debug
      targets:
        - UX-Music-Wear
